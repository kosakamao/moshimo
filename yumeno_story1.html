<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MoshiMo | yumeno story 1</title>
<link rel="stylesheet" href="story.css">
</head>
<body>
<div class="phone">
  <main class="story" aria-label="yumenoのストーリー1">
    <div class="bg"><img src="yumeno_1.png" alt="Shiny Lensの箱を持ってピースする夢乃"></div>
    <button class="answers" type="button" id="answersBtn">回答ログ</button>

    <section class="top">
      <div class="bars">
        <div class="bar active" style="--progress:70%"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      <div class="profile">
        <button class="back" type="button" onclick="location.href='index.html'" aria-label="戻る">‹</button>
        <img class="icon" src="yumeno.png" alt="夢乃のアイコン">
        <div>
          <div class="who">yumeno 🦋</div>
          <div class="time">2分前 ・ PR相談</div>
        </div>
        <div class="dots">…</div>
        <button class="close" type="button" onclick="location.href='index.html'" aria-label="閉じる">×</button>
      </div>
    </section>

    <section class="content">
      <div class="sticker">話題になってた<br><b>Shiny Lens</b>様から<br>DMきちゃ🥰</div>
      <div class="subtxt">お返事どうしよっかな🧐💭<br>案件料、投稿3本＋ストーリーで18,000円らしい…！</div>

      <div class="reaction" aria-hidden="true">
        <button type="button">♡<small>742</small></button>
        <button type="button" class="comment-badge">💬<small>1,284</small></button>
        <button type="button">↗<small>共有</small></button>
      </div>

      <section class="poll" id="poll" aria-label="ストーリーアンケート">
        <h2>💭 これ見てどう思う？</h2>
        <button class="option" type="button" data-text="18,000円は大きい" data-pct="62"><span class="fill"></span><span class="label"><span><i class="circle"></i>18,000円は大きい</span><span class="percent">62%</span></span></button>
        <button class="option" type="button" data-text="前から欲しかった仕事" data-pct="46"><span class="fill"></span><span class="label"><span><i class="circle"></i>前から欲しかった仕事</span><span class="percent">46%</span></span></button>
        <button class="option" type="button" data-text="少し怪しい気もする" data-pct="28"><span class="fill"></span><span class="label"><span><i class="circle"></i>少し怪しい気もする</span><span class="percent">28%</span></span></button>
        <button class="option" type="button" data-text="フォロワーを増やせそう" data-pct="39"><span class="fill"></span><span class="label"><span><i class="circle"></i>フォロワーを増やせそう</span><span class="percent">39%</span></span></button>
        <button class="option" type="button" data-text="断ると次の案件が来なくなるかも" data-pct="33"><span class="fill"></span><span class="label"><span><i class="circle"></i>断ると次の案件が来なくなるかも</span><span class="percent">33%</span></span></button>
        <div class="note" id="note">送信したで。ここでは正解より、どんな理由でそう感じたかが大事や。</div>
        <div class="navrow"><button class="next" id="nextBtn" type="button">次のストーリーへ ▶</button></div>
      </section>
    </section>
  </main>

  <div class="bottom">
    <div class="reply">メッセージを送信…</div>
    <button class="send" type="button">送信</button>
  </div>
</div>

<aside class="sheet" id="sheet" aria-label="回答ログ">
  <h3>回答ログ</h3>
  <p>最終的にはここに、各ストーリーでプレーヤーが選んだ回答が一覧で残る想定やで。</p>
  <div id="answerList"><div class="row">まだ回答がありません。</div></div>
  <button type="button" id="closeSheet">閉じる</button>
</aside>

<script>
const poll = document.getElementById('poll');
const options = document.querySelectorAll('.option');
const note = document.getElementById('note');
const nextBtn = document.getElementById('nextBtn');
const key = 'moshimo_yumeno_answers';

function getAnswers(){
  try { return JSON.parse(localStorage.getItem(key)) || []; }
  catch(e){ return []; }
}
function saveAnswer(text){
  const answers = getAnswers().filter(a => a.id !== 'yumeno_story1');
  answers.push({id:'yumeno_story1', title:'Story 1：PR案件のDM', answer:text, time:new Date().toLocaleString('ja-JP')});
  localStorage.setItem(key, JSON.stringify(answers));
  renderAnswers();
}
function renderAnswers(){
  const list = document.getElementById('answerList');
  const answers = getAnswers();
  if(!answers.length){ list.innerHTML = '<div class="row">まだ回答がありません。</div>'; return; }
  list.innerHTML = answers.map(a => `<div class="row"><strong>${a.title}</strong><br>${a.answer}<br><small>${a.time}</small></div>`).join('');
}

options.forEach(option => {
  option.addEventListener('click', () => {
    options.forEach(o => o.classList.remove('selected'));
    option.classList.add('selected');
    poll.classList.add('voted');
    options.forEach(o => { o.querySelector('.fill').style.width = o.dataset.pct + '%'; });
    note.classList.add('show');
    nextBtn.classList.add('show');
    saveAnswer(option.dataset.text);
  });
});

nextBtn.addEventListener('click', () => { window.location.href='yumeno_story2.html'; });
document.getElementById('answersBtn').addEventListener('click', () => document.getElementById('sheet').classList.add('show'));
document.getElementById('closeSheet').addEventListener('click', () => document.getElementById('sheet').classList.remove('show'));
renderAnswers();
</script>
</body>
</html>
