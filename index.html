<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>人生で詰まない Health Feed Prototype</title>
<style>
:root{--bg:#0d0b12;--text:#fff7fb;--pink:#ff83b7;--rose:#ffd5e7;--line:rgba(255,255,255,.14)}
*{box-sizing:border-box} body{margin:0;background:#0d0b12;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}.app{max-width:430px;margin:0 auto;min-height:100svh;background:#000;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.35)}
.topbar{position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:20;width:min(430px,100%);height:58px;display:flex;align-items:center;justify-content:center;gap:24px;background:linear-gradient(to bottom,rgba(0,0,0,.62),rgba(0,0,0,0));font-weight:700;text-shadow:0 1px 8px #000}.topbar button{appearance:none;border:0;background:none;color:rgba(255,255,255,.72);font:inherit;padding:12px 4px;cursor:pointer}.topbar button.active{color:#fff;border-bottom:3px solid #fff}
.feed,.search{height:100svh;overflow-y:auto;scroll-snap-type:y mandatory;scrollbar-width:none;background:#000}.feed::-webkit-scrollbar,.search::-webkit-scrollbar{display:none}.card{height:100svh;position:relative;scroll-snap-align:start;overflow:hidden;background:#141017}.visual{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 20%,rgba(255,131,183,.36),transparent 38%),linear-gradient(145deg,#201527,#08070b 66%)}.visual::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15),transparent 35%,rgba(0,0,0,.72))}.thumb-img{width:100%;height:100%;object-fit:cover;filter:saturate(1.08) contrast(.98);animation:kenburns 2s ease-in-out infinite alternate}@keyframes kenburns{from{transform:scale(1.02)}to{transform:scale(1.08) translateY(-1%)}}
.fake-scene{position:absolute;inset:0;display:grid;place-items:center;padding:34px;text-align:center}.scene-inner{width:78%;aspect-ratio:9/14;border-radius:30px;border:1px solid rgba(255,255,255,.18);background:linear-gradient(160deg,rgba(255,255,255,.17),rgba(255,255,255,.04));display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;box-shadow:0 28px 80px rgba(0,0,0,.45);backdrop-filter:blur(3px)}.emoji{font-size:64px;filter:drop-shadow(0 6px 18px rgba(0,0,0,.35))}.play{appearance:none;color:#fff;cursor:pointer;position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);z-index:3;width:76px;height:76px;border-radius:50%;display:grid;place-items:center;background:rgba(0,0,0,.36);border:1px solid rgba(255,255,255,.32);font-size:38px;text-indent:5px;backdrop-filter:blur(8px)}
.caption{position:absolute;z-index:4;left:18px;right:86px;bottom:88px;text-shadow:0 2px 10px #000}.account{font-weight:800;font-size:18px;margin-bottom:8px}.avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.85);background:#ffd5e7;vertical-align:middle;margin-right:8px}.desc{font-size:15px;line-height:1.55;margin:0 0 8px}.tags{font-size:13px;color:#f7d6e7;font-weight:700}.side{position:absolute;z-index:5;right:15px;bottom:92px;display:flex;flex-direction:column;gap:18px;align-items:center;text-shadow:0 2px 10px #000}.side button{appearance:none;border:0;background:none;color:#fff;font-size:25px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}.side small{font-size:11px;color:#fff}.cta{position:absolute;z-index:6;left:18px;right:18px;bottom:22px;display:flex;gap:10px}.cta button{flex:1;border:0;border-radius:999px;padding:13px 14px;font-weight:800;font-size:14px;cursor:pointer}.primary{background:#fff;color:#141018}.secondary{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.2)!important;backdrop-filter:blur(8px)}
.search{display:none;padding:72px 14px 92px;background:linear-gradient(180deg,#0c0a10,#17101c)}.search.active{display:block}.feed.hidden{display:none}.searchbox{position:sticky;top:62px;z-index:10;background:rgba(23,16,28,.82);backdrop-filter:blur(12px);padding:8px 0 12px}.searchbox input{width:100%;border:1px solid rgba(255,255,255,.16);border-radius:14px;background:rgba(255,255,255,.1);color:#fff;padding:13px 15px;font-size:16px;outline:none}.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none}.chip{white-space:nowrap;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.1);color:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.tile{position:relative;min-height:245px;border-radius:18px;overflow:hidden;background:#21172a;border:1px solid rgba(255,255,255,.1);cursor:pointer;padding:0}.tile .visual{position:absolute;inset:0}.tile .fake-scene{padding:18px}.tile .scene-inner{width:90%;border-radius:22px}.tile .emoji{font-size:42px}.tile .thumb-img{animation:none}.tile::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.7))}.tile-info{position:absolute;z-index:3;left:10px;right:10px;bottom:10px;text-shadow:0 2px 8px #000;color:#fff;text-align:left}.tile-title{font-weight:900;font-size:14px;line-height:1.35}.tile-meta{font-size:12px;color:#f3d7e7;margin-top:4px}.tile-play{position:absolute;z-index:4;top:10px;left:10px;background:rgba(0,0,0,.42);border-radius:999px;padding:5px 9px;font-weight:900;color:#fff}.bottomnav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:30;width:min(430px,100%);height:66px;background:rgba(0,0,0,.86);backdrop-filter:blur(14px);display:flex;justify-content:space-around;align-items:center;border-top:1px solid rgba(255,255,255,.12)}.bottomnav button{appearance:none;border:0;background:none;color:rgba(255,255,255,.62);font-weight:800;font-size:12px;display:flex;flex-direction:column;gap:4px;align-items:center;cursor:pointer}.bottomnav button.active{color:#fff}.modal{position:fixed;z-index:40;inset:0;background:rgba(0,0,0,.55);display:none;align-items:end;justify-content:center}.modal.show{display:flex}.sheet{width:min(430px,100%);max-height:78svh;background:#fff7fb;color:#241724;border-radius:24px 24px 0 0;padding:20px;overflow:auto;box-shadow:0 -20px 60px rgba(0,0,0,.4)}.sheet h2{margin:0 0 8px;font-size:20px}.sheet p{line-height:1.7;margin:9px 0;color:#4b3a4c}.sheet button{width:100%;border:0;border-radius:999px;background:#251627;color:white;padding:13px;font-weight:900;margin-top:10px}.notice{margin:14px 0;padding:12px;border-radius:16px;background:#fff0f7;border:1px solid #ffd1e5;font-size:13px;line-height:1.65;color:#5b4055}@media (min-width:431px){body{background:radial-gradient(circle at top,#40304c,#0b0810 55%)}.app{border-left:1px solid rgba(255,255,255,.12);border-right:1px solid rgba(255,255,255,.12)}}
</style></head><body><div class="app"><div class="topbar"><button class="tabTop active" data-tab="feed">おすすめ</button><button class="tabTop" data-tab="search">検索</button></div><main class="feed" id="feed"></main><section class="search" id="search"><div class="searchbox"><input id="searchInput" placeholder="検索：美容、眠気、筋トレ、薬…" aria-label="検索"><div class="chips"><button class="chip" data-q="美容">美容</button><button class="chip" data-q="眠気">眠気</button><button class="chip" data-q="筋トレ">筋トレ</button><button class="chip" data-q="薬">薬</button><button class="chip" data-q="食事">食事</button></div></div><div class="notice">検索結果もぜんぶ教材。SNSっぽく見せながら、タップすると「どうしてそうした？」を考えるケースに入るプロトタイプやで。</div><div class="grid" id="grid"></div></section><nav class="bottomnav"><button class="nav active" data-tab="feed"><span>🏠</span>おすすめ</button><button class="nav" data-tab="search"><span>🔎</span>検索</button><button class="nav" data-tab="saved"><span>📖</span>学習ログ</button></nav></div><div class="modal" id="modal"><div class="sheet"><h2 id="modalTitle"></h2><p id="modalBody"></p><div class="notice" id="modalNote"></div><button id="closeModal">閉じる</button></div></div>
<script>
const IMG = "yumeno.png";
const lessons = [
  {id:'yumeno', name:'yumeno🦋', theme:'激安カラコンで詰まない', tags:'#PR #カラコン #美容 #眼科', desc:'今日届いたカラコン🎀 めっちゃ盛れるんだけど、右目だけちょっと痛い🥲', img:IMG, emoji:'🦋', search:'美容 カラコン 眼科 PR', detail:'夢乃は26歳、アパレル販売員。PR案件で届いたカラコンを装用したあと、目の違和感が出る。コメント欄には「眼科いこ」「あと1日案件頑張ろ」「抗菌目薬つかお」などが並ぶ。ユーザーは、夢乃がなぜ受診を後回しにしたのかを考える。', note:'医学ポイント：コンタクトによる角膜上皮障害、感染性角膜炎、角膜潰瘍。痛み・充血・羞明があれば装用中止と眼科受診。'},
  {id:'caffeine', name:'ren_study', theme:'カフェイン錠剤を飲みすぎたら', tags:'#勉強垢 #夜勤 #眠気 #カフェイン', desc:'眠気飛ばしたいだけだった。1錠なら平気、じゃあ2錠ならもっと効く？', emoji:'💊', search:'薬 眠気 勉強 カフェイン', detail:'資格試験前の蓮。エナドリより安くて効くと思い、カフェイン錠剤を追加していく。動悸、手の震え、不眠、吐き気が出ても「試験前だから」と止められない。', note:'医学ポイント：カフェイン過量による中枢神経刺激、頻脈、振戦、悪心、不眠。不安やパニック様症状と見分けにくいことも。'},
  {id:'protein', name:'gym_haru', theme:'プロテインだけ飲んでいたら', tags:'#筋トレ #減量 #プロテイン #食事', desc:'食事考えるのめんどいし、プロテインなら太らないっしょ。', emoji:'💪', search:'筋トレ 食事 プロテイン 減量', detail:'会社員Haru。減量のために食事を極端に削り、プロテイン中心生活へ。体重は落ちたが、倦怠感、便秘、肌荒れ、集中力低下が続く。', note:'医学ポイント：特定食品への偏り、エネルギー不足、食物繊維・ビタミン・ミネラル不足。プロテイン自体ではなく、極端な食生活が問題。'},
  {id:'botox', name:'mii_beauty', theme:'ボトックスを受けたら', tags:'#美容医療 #小顔 #自由診療', desc:'初回9800円ならアリでは？ 口コミも悪くないし。', emoji:'💉', search:'美容 ボトックス 自由診療', detail:'美容医療レポを投稿するmii。SNS広告から格安クリニックへ。説明は短く、リスクよりビフォーアフターに意識が向く。術後、表情の違和感や左右差に悩む。', note:'医学ポイント：自由診療の意思決定、適応、説明同意、術者選び、合併症。美容医療は「安い・早い」だけで選ばない。'},
  {id:'antibiotic', name:'hina_days', theme:'抗菌薬を途中でやめたら', tags:'#耳鼻科 #副鼻腔炎 #抗菌薬 #薬', desc:'もう鼻も痛くないし、薬大きいし、飲まなくてよくない？', emoji:'🤧', search:'薬 副鼻腔炎 抗菌薬 風邪', detail:'陽菜は風邪のあと頬の痛みと膿性鼻汁で耳鼻科へ。急性副鼻腔炎として抗菌薬を処方される。2日で楽になり自己判断で中止したが、その後ぶり返す。', note:'医学ポイント：抗菌薬は疾患・薬剤ごとに使い方が異なる。自己判断で中止・延長せず、処方意図と再受診の目安を確認する。'},
  {id:'coffee', name:'yu_da_truck', theme:'缶コーヒーを毎日飲んだら', tags:'#ドライバー #夜勤 #缶コーヒー', desc:'運転中の眠気対策。甘い缶コーヒーが相棒。', emoji:'☕', search:'眠気 缶コーヒー 糖尿病 ドライバー', detail:'雄大34歳、配送ドライバー。眠気対策に甘い缶コーヒーを毎日何本も飲む。疲れやすさ、喉の渇き、体重変化に気づくが放置。', note:'医学ポイント：糖分を含む飲料の習慣化、体重増加、糖代謝異常。眠気の背景に睡眠不足や睡眠時無呼吸が隠れることも。'}
];
const feed=document.getElementById('feed'), grid=document.getElementById('grid');
function visual(item){ if(item.img) return `<img class="thumb-img" src="${item.img}" alt="${item.name}のサムネイル">`; return `<div class="fake-scene"><div class="scene-inner"><div class="emoji">${item.emoji}</div><strong>${item.theme}</strong><span style="color:#f4d9e8;font-size:12px">2秒ループ動画予定</span></div></div>`; }
function renderFeed(list=lessons){
  feed.innerHTML=list.map(item=>`<article class="card" data-id="${item.id}">
    <div class="visual">${visual(item)}</div>
    <button class="play" type="button" data-action="open" data-id="${item.id}" aria-label="${item.theme}を再生">▶</button>
    <div class="side">
      <button type="button" data-action="save" data-id="${item.id}">♡<small>保存</small></button>
      <button type="button" data-action="comment" data-id="${item.id}">💬<small>コメント</small></button>
      <button type="button" data-action="share" data-id="${item.id}">↗<small>共有</small></button>
    </div>
    <section class="caption">
      <div class="account">${item.img?`<img class="avatar" src="${item.img}">`:''}${item.name}</div>
      <p class="desc">${item.desc}</p>
      <div class="tags">${item.tags}</div>
    </section>
  </article>`).join('');
  document.querySelectorAll('[data-action="open"]').forEach(b=>b.addEventListener('click',()=>openLesson(b.dataset.id)));
  document.querySelectorAll('[data-action="comment"]').forEach(b=>b.addEventListener('click',()=>openComments(b.dataset.id)));
  document.querySelectorAll('[data-action="save"]').forEach(b=>b.addEventListener('click',()=>toast('学習ログに保存しました')));
  document.querySelectorAll('[data-action="share"]').forEach(b=>b.addEventListener('click',()=>toast('共有リンクをコピーする想定です')));
}
function renderGrid(q=''){ const kw=q.trim(); const list=kw?lessons.filter(x=>(x.search+x.theme+x.tags+x.name).includes(kw)):lessons; grid.innerHTML=list.map(item=>`<button class="tile" type="button" data-id="${item.id}"><div class="visual">${visual(item)}</div><div class="tile-play">▶ 2秒</div><div class="tile-info"><div class="tile-title">${item.theme}</div><div class="tile-meta">${item.name}　${item.tags}</div></div></button>`).join(''); document.querySelectorAll('.tile').forEach(t=>t.addEventListener('click',()=>openLesson(t.dataset.id))); }
function openLesson(id){
  if(id === 'yumeno'){
    window.location.href = 'yumeno_story1.html';
    return;
  }
  const item=lessons.find(x=>x.id===id);
  document.getElementById('modalTitle').textContent=item.theme;
  document.getElementById('modalBody').textContent=item.detail;
  document.getElementById('modalNote').textContent=item.note;
  document.getElementById('modal').classList.add('show');
}

function openComments(id){
  const item = lessons.find(x=>x.id===id);
  document.getElementById('modalTitle').textContent = 'コメント';
  document.getElementById('modalBody').innerHTML = item.id === 'yumeno'
    ? 'ri_07：カラコンかわいいけど目痛いなら外して😭<br><br>moka__luv：PR案件って断りづらいの分かる…<br><br>aya._15：眼科いこ、ほんまに目は替えがきかん<br><br>student_med：痛み・充血・まぶしさは受診サインかも'
    : 'この章の学習者コメントがここに入る想定です。';
  document.getElementById('modalNote').textContent = '最終的には、学習した人の感想や「自分ならこうする」がコメントとして蓄積される想定。';
  document.getElementById('modal').classList.add('show');
}
function toast(message){
  document.getElementById('modalTitle').textContent = 'MoshiMo';
  document.getElementById('modalBody').textContent = message;
  document.getElementById('modalNote').textContent = 'プロトタイプのため、実際の保存・共有機能はまだ未実装です。';
  document.getElementById('modal').classList.add('show');
}
document.getElementById('closeModal').addEventListener('click',()=>document.getElementById('modal').classList.remove('show'));document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')e.currentTarget.classList.remove('show')});
function switchTab(tab){document.getElementById('feed').classList.toggle('hidden',tab!=='feed');document.getElementById('search').classList.toggle('active',tab==='search');document.querySelectorAll('.nav,.tabTop').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));}
document.querySelectorAll('.nav,.tabTop').forEach(b=>b.addEventListener('click',()=>{ if(b.dataset.tab==='saved') return openLesson('yumeno'); switchTab(b.dataset.tab); }));document.getElementById('searchInput').addEventListener('input',e=>renderGrid(e.target.value));document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{document.getElementById('searchInput').value=c.dataset.q;renderGrid(c.dataset.q);}));
renderFeed(); renderGrid();
</script></body></html>
