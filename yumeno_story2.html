<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MoshiMo | yumeno story 2</title>
<style>
:root{--bg:#07050a;--white:#fff;--ink:#fff7fb;--muted:rgba(255,255,255,.76);--pink:#ff7bad;--pink2:#ffd8e8;--hot:#ff3b76;--glass:rgba(255,255,255,.16);--line:rgba(255,255,255,.22);--shadow:0 22px 70px rgba(0,0,0,.36)}
*{box-sizing:border-box} html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% 0,#3b2230,#09060c 55%);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;color:var(--ink)} body{display:flex;justify-content:center}.phone{width:min(430px,100%);min-height:100svh;background:#000;position:relative;overflow:hidden;box-shadow:0 0 44px rgba(0,0,0,.4)}
.story{min-height:100svh;position:relative;display:flex;flex-direction:column;background:#130b12}.bg{position:absolute;inset:0;overflow:hidden}.bg{background:#050308}.bg img{width:100%;height:100%;object-fit:contain;object-position:center top;display:block;filter:saturate(1.04) contrast(.97)}.bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.34),rgba(0,0,0,.04) 30%,rgba(0,0,0,.12) 54%,rgba(0,0,0,.82))}.bg::before{content:"";position:absolute;z-index:1;inset:0;background:radial-gradient(circle at 20% 18%,rgba(255,210,232,.20),transparent 34%),radial-gradient(circle at 84% 62%,rgba(255,123,173,.14),transparent 32%)}@keyframes storyZoom{from{transform:scale(1.02)}to{transform:scale(1.07) translateY(-1%)}}
.top{position:relative;z-index:5;padding:10px 12px 0}.bars{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:10px}.bar{height:3px;border-radius:999px;background:rgba(255,255,255,.32);overflow:hidden}.bar:first-child{background:#fff}.bar:nth-child(2)::after{content:"";display:block;height:100%;width:64%;background:#fff;border-radius:inherit}.profile{display:flex;align-items:center;gap:9px;text-shadow:0 2px 10px rgba(0,0,0,.55)}.back{width:32px;height:32px;border:0;border-radius:999px;background:rgba(0,0,0,.28);color:#fff;font-size:25px;line-height:1;display:grid;place-items:center;cursor:pointer;backdrop-filter:blur(8px)}.icon{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.9);background:#ffd8e8}.who{font-weight:900}.time{font-size:12px;color:var(--muted);margin-top:2px}.dots{margin-left:auto;font-size:25px;font-weight:900}.close{width:32px;height:32px;border:0;border-radius:999px;background:rgba(0,0,0,.28);color:#fff;font-size:24px;line-height:1;cursor:pointer;backdrop-filter:blur(8px)}
.content{position:relative;z-index:4;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 14px 82px}.sticker{align-self:flex-start;max-width:74%;transform:rotate(-1.2deg);background:rgba(255,255,255,.92);color:#231821;border-radius:18px;padding:10px 12px;box-shadow:var(--shadow);font-weight:900;font-size:16px;line-height:1.28;letter-spacing:.01em}.sticker b{color:#df477b}.subtxt{align-self:flex-start;margin-top:7px;max-width:78%;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.24);backdrop-filter:blur(9px);border-radius:15px;padding:8px 10px;color:#fff;font-size:12px;line-height:1.45;text-shadow:0 2px 9px #000}.reaction{position:absolute;right:12px;bottom:198px;display:flex;flex-direction:column;gap:15px;text-align:center;text-shadow:0 2px 10px #000}.reaction button{appearance:none;border:0;background:none;color:#fff;font-size:26px;cursor:pointer}.reaction small{display:block;font-size:11px;color:#fff;margin-top:1px;font-weight:800}.comment-badge{position:relative}.comment-badge::after{content:"";position:absolute;right:7px;top:0;width:11px;height:11px;border-radius:50%;background:var(--hot);border:2px solid #fff;animation:pulse 1.2s infinite}@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.28);opacity:.78}}
.poll{position:relative;z-index:7;align-self:center;width:min(84%,340px);margin-top:10px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.24);box-shadow:var(--shadow);backdrop-filter:blur(15px);border-radius:18px;padding:9px}.poll h2{font-size:13px;line-height:1.25;margin:0 0 6px;text-align:center;text-shadow:0 1px 8px rgba(0,0,0,.35)}.option{position:relative;width:100%;min-height:30px;border:1px solid rgba(255,255,255,.40);border-radius:999px;background:rgba(255,255,255,.88);color:#251820;margin:5px 0;padding:6px 9px;text-align:left;font-size:12.5px;font-weight:850;overflow:hidden;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.10)}.option .fill{position:absolute;inset:0 auto 0 0;width:0;background:linear-gradient(90deg,#ffd6e6,#ff8fba);opacity:.72;transition:width .55s ease}.option .label{position:relative;z-index:2;display:flex;align-items:center;gap:8px;justify-content:space-between}.option .label span:first-child{display:flex;align-items:center;gap:8px}.circle{width:15px;height:15px;border-radius:50%;border:2px solid #e06494;display:inline-grid;place-items:center;flex:0 0 auto;background:#fff}.percent{display:none;font-weight:950;color:#6a354d}.poll.voted .percent{display:inline}.option.selected .circle{background:#e94d82;border-color:#e94d82}.option.selected .circle::after{content:"✓";color:white;font-size:12px;font-weight:950}.note{display:none;margin-top:7px;background:rgba(255,247,251,.92);color:#5a3a49;border-radius:14px;padding:8px 10px;font-size:12px;line-height:1.5}.note.show{display:block}.navrow{display:flex;gap:7px;margin-top:7px}.next,.prev{display:none;flex:1;border:0;border-radius:999px;background:#fff;color:#21161e;padding:9px 10px;font-weight:950;font-size:12.5px;cursor:pointer}.prev{background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.28)}.next.show,.prev.show{display:block}.bottom{position:fixed;z-index:10;left:50%;bottom:0;transform:translateX(-50%);width:min(430px,100%);height:70px;display:flex;align-items:center;gap:9px;padding:10px 14px;background:linear-gradient(to top,rgba(0,0,0,.72),rgba(0,0,0,0));}.reply{flex:1;border:1px solid rgba(255,255,255,.42);border-radius:999px;background:rgba(0,0,0,.28);color:rgba(255,255,255,.82);padding:12px 14px;font-size:14px;backdrop-filter:blur(8px)}.send{border:0;background:rgba(255,255,255,.9);color:#21161e;border-radius:999px;padding:11px 15px;font-weight:950}.answers{position:fixed;z-index:20;right:12px;top:84px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.24);border-radius:999px;color:#fff;padding:7px 10px;font-size:12px;font-weight:900;backdrop-filter:blur(8px);cursor:pointer}.sheet{position:fixed;z-index:30;left:50%;bottom:0;transform:translateX(-50%) translateY(105%);width:min(430px,100%);max-height:58svh;background:#fff8fb;color:#251820;border-radius:24px 24px 0 0;padding:18px;box-shadow:0 -22px 70px rgba(0,0,0,.35);transition:.25s ease;overflow:auto}.sheet.show{transform:translateX(-50%) translateY(0)}.sheet h3{margin:0 0 10px}.sheet p{margin:8px 0;line-height:1.65;color:#5a4550;font-size:14px}.sheet .row{background:#fff;border:1px solid #efd8e1;border-radius:14px;padding:10px 12px;margin:8px 0}.sheet button{width:100%;border:0;border-radius:999px;background:#251820;color:#fff;padding:12px;font-weight:900;margin-top:10px}@media (min-width:431px){.phone{margin:18px 0;border-radius:28px;min-height:calc(100svh - 36px)}.bottom{bottom:18px;border-radius:0 0 28px 28px}.sheet{bottom:18px;border-radius:24px}.story{border-radius:28px;overflow:hidden}}
</style>
</head>
<body>
<div class="phone">
  <main class="story" aria-label="yumenoのストーリー2">
    <div class="bg"><img src="yumeno_2.png" alt="カラコンをつけて右目を気にする夢乃"></div>
    <button class="answers" type="button" id="answersBtn">回答ログ</button>
    <section class="top">
      <div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      <div class="profile">
        <button class="back" type="button" onclick="location.href='yumeno_story1.html'" aria-label="戻る">‹</button>
        <img class="icon" src="yumeno.png" alt="夢乃のアイコン">
        <div><div class="who">yumeno 🦋</div><div class="time">2時間前 ・ 開封レポ</div></div>
        <div class="dots">…</div>
        <button class="close" type="button" onclick="location.href='index.html'" aria-label="閉じる">×</button>
      </div>
    </section>

    <section class="content">
      <div class="sticker">カラコン届いた〜っ🎀<br>めっちゃ<b>盛れる</b>…！🥹💕</div>
      <div class="subtxt">でも右目だけ少しゴロゴロする気がする…🤔<br>こういうことある？？</div>

      <div class="reaction" aria-hidden="true">
        <button type="button">♡<small>1,126</small></button>
        <button type="button" class="comment-badge">💬<small>487</small></button>
        <button type="button">↗<small>共有</small></button>
      </div>

      <section class="poll" id="poll" aria-label="ストーリーアンケート">
        <h2>💭 これ、どうしたらいいと思う？</h2>
        <button class="option" type="button" data-text="様子を見る" data-pct="54"><span class="fill"></span><span class="label"><span><i class="circle"></i>様子を見る</span><span class="percent">54%</span></span></button>
        <button class="option" type="button" data-text="手持ちの目薬をさす" data-pct="47"><span class="fill"></span><span class="label"><span><i class="circle"></i>手持ちの目薬をさす</span><span class="percent">47%</span></span></button>
        <button class="option" type="button" data-text="外して洗ってつけ直す" data-pct="36"><span class="fill"></span><span class="label"><span><i class="circle"></i>外して洗ってつけ直す</span><span class="percent">36%</span></span></button>
        <button class="option" type="button" data-text="すぐ装用をやめる" data-pct="24"><span class="fill"></span><span class="label"><span><i class="circle"></i>すぐ装用をやめる</span><span class="percent">24%</span></span></button>
        <button class="option" type="button" data-text="眼科に行く" data-pct="18"><span class="fill"></span><span class="label"><span><i class="circle"></i>眼科に行く</span><span class="percent">18%</span></span></button>
        <div class="note" id="note">投票したで。ここでは「正しい対応」だけじゃなく、夢乃が“なぜそうしそうか”を考えるのがポイントや。盛れている、案件である、まだ軽い違和感に見える──この3つが判断を鈍らせるかもしれん。</div>
        <div class="navrow"><button class="prev show" id="prevBtn" type="button">◀ 前のストーリー</button><button class="next" id="nextBtn" type="button">次のストーリーへ ▶</button></div>
      </section>
    </section>
  </main>

  <div class="bottom">
    <div class="reply">メッセージを送信…</div>
    <button class="send" type="button">送信</button>
  </div>
</div>

<aside class="sheet" id="sheet" aria-label="回答ログ">
  <h3>回答ログ</h3>
  <p>各ストーリーでプレーヤーが選んだ回答がここに残る想定やで。</p>
  <div id="answerList"><div class="row">まだ回答がありません。</div></div>
  <button type="button" id="closeSheet">閉じる</button>
</aside>

<script>
const poll = document.getElementById('poll');
const options = document.querySelectorAll('.option');
const note = document.getElementById('note');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');
const key = 'moshimo_yumeno_answers';

function getAnswers(){
  try { return JSON.parse(localStorage.getItem(key)) || []; }
  catch(e){ return []; }
}
function saveAnswer(text){
  const answers = getAnswers().filter(a => a.id !== 'yumeno_story2');
  answers.push({id:'yumeno_story2', title:'Story 2：盛れるけどゴロゴロする', answer:text, time:new Date().toLocaleString('ja-JP')});
  localStorage.setItem(key, JSON.stringify(answers));
  renderAnswers();
}
function renderAnswers(){
  const list = document.getElementById('answerList');
  const answers = getAnswers();
  if(!answers.length){ list.innerHTML = '<div class="row">まだ回答がありません。</div>'; return; }
  list.innerHTML = answers.map(a => `<div class="row"><strong>${a.title}</strong><br>${a.answer}<br><small>${a.time}</small></div>`).join('');
}

options.forEach(option => {
  option.addEventListener('click', () => {
    options.forEach(o => o.classList.remove('selected'));
    option.classList.add('selected');
    poll.classList.add('voted');
    options.forEach(o => {
      o.querySelector('.fill').style.width = o.dataset.pct + '%';
    });
    note.classList.add('show');
    nextBtn.classList.add('show');
    saveAnswer(option.dataset.text);
  });
});

prevBtn.addEventListener('click', () => location.href = 'yumeno_story1.html');
nextBtn.addEventListener('click', () => {
  alert('次は「目薬でごまかして、案件投稿のためにもう一度つける」のストーリー予定やで。');
});

document.getElementById('answersBtn').addEventListener('click', () => document.getElementById('sheet').classList.add('show'));
document.getElementById('closeSheet').addEventListener('click', () => document.getElementById('sheet').classList.remove('show'));
renderAnswers();
</script>
</body>
</html>
