<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MoshiMo | yumeno story 2</title>
<link rel="stylesheet" href="story.css">

</head>
<body>
<div class="phone">
  <main class="story" aria-label="yumenoのストーリー2">
    <div class="bg"><img src="yumeno_2.png" alt="カラコンをつけて右目を気にする夢乃"></div>
    <button class="answers" type="button" id="answersBtn">回答ログ</button>
    <section class="top">
      <div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      <div class="profile">
        <button class="back" type="button" onclick="location.href='yumeno_story1.html'" aria-label="戻る">‹</button>
        <img class="icon" src="yumeno.png" alt="夢乃のアイコン">
        <div><div class="who">yumeno 🦋</div><div class="time">2時間前 ・ 開封レポ</div></div>
        <div class="dots">…</div>
        <button class="close" type="button" onclick="location.href='index.html'" aria-label="閉じる">×</button>
      </div>
    </section>

    <section class="content">
      <div class="sticker">カラコン届いた〜っ🎀<br>めっちゃ<b>盛れる</b>…！🥹💕</div>
      <div class="subtxt">でも右目だけ少しゴロゴロする気がする…🤔<br>こういうことある？？</div>

      <div class="reaction" aria-hidden="true">
        <button type="button">♡<small>1,126</small></button>
        <button type="button" class="comment-badge">💬<small>487</small></button>
        <button type="button">↗<small>共有</small></button>
      </div>

      <section class="poll" id="poll" aria-label="ストーリーアンケート">
        <h2>💭 これ、どうしたらいいと思う？</h2>
        <button class="option" type="button" data-text="様子を見る" data-pct="54"><span class="fill"></span><span class="label"><span><i class="circle"></i>様子を見る</span><span class="percent">54%</span></span></button>
        <button class="option" type="button" data-text="手持ちの目薬をさす" data-pct="47"><span class="fill"></span><span class="label"><span><i class="circle"></i>手持ちの目薬をさす</span><span class="percent">47%</span></span></button>
        <button class="option" type="button" data-text="外して洗ってつけ直す" data-pct="36"><span class="fill"></span><span class="label"><span><i class="circle"></i>外して洗ってつけ直す</span><span class="percent">36%</span></span></button>
        <button class="option" type="button" data-text="すぐ装用をやめる" data-pct="24"><span class="fill"></span><span class="label"><span><i class="circle"></i>すぐ装用をやめる</span><span class="percent">24%</span></span></button>
        <button class="option" type="button" data-text="眼科に行く" data-pct="18"><span class="fill"></span><span class="label"><span><i class="circle"></i>眼科に行く</span><span class="percent">18%</span></span></button>
        <div class="note" id="note">投票したで。ここでは「正しい対応」だけじゃなく、夢乃が“なぜそうしそうか”を考えるのがポイントや。盛れている、案件である、まだ軽い違和感に見える──この3つが判断を鈍らせるかもしれん。</div>
        <div class="navrow"><button class="prev show" id="prevBtn" type="button">◀ 前のストーリー</button><button class="next" id="nextBtn" type="button">次のストーリーへ ▶</button></div>
      </section>
    </section>
  </main>

  <div class="bottom">
    <div class="reply">メッセージを送信…</div>
    <button class="send" type="button">送信</button>
  </div>
</div>

<aside class="sheet" id="sheet" aria-label="回答ログ">
  <h3>回答ログ</h3>
  <p>各ストーリーでプレーヤーが選んだ回答がここに残る想定やで。</p>
  <div id="answerList"><div class="row">まだ回答がありません。</div></div>
  <button type="button" id="closeSheet">閉じる</button>
</aside>

<script>
const poll = document.getElementById('poll');
const options = document.querySelectorAll('.option');
const note = document.getElementById('note');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');
const key = 'moshimo_yumeno_answers';

function getAnswers(){
  try { return JSON.parse(localStorage.getItem(key)) || []; }
  catch(e){ return []; }
}
function saveAnswer(text){
  const answers = getAnswers().filter(a => a.id !== 'yumeno_story2');
  answers.push({id:'yumeno_story2', title:'Story 2：盛れるけどゴロゴロする', answer:text, time:new Date().toLocaleString('ja-JP')});
  localStorage.setItem(key, JSON.stringify(answers));
  renderAnswers();
}
function renderAnswers(){
  const list = document.getElementById('answerList');
  const answers = getAnswers();
  if(!answers.length){ list.innerHTML = '<div class="row">まだ回答がありません。</div>'; return; }
  list.innerHTML = answers.map(a => `<div class="row"><strong>${a.title}</strong><br>${a.answer}<br><small>${a.time}</small></div>`).join('');
}

options.forEach(option => {
  option.addEventListener('click', () => {
    options.forEach(o => o.classList.remove('selected'));
    option.classList.add('selected');
    poll.classList.add('voted');
    options.forEach(o => {
      o.querySelector('.fill').style.width = o.dataset.pct + '%';
    });
    note.classList.add('show');
    nextBtn.classList.add('show');
    saveAnswer(option.dataset.text);
  });
});

prevBtn.addEventListener('click', () => location.href = 'yumeno_story1.html');
nextBtn.addEventListener('click', () => {
  alert('次は「目薬でごまかして、案件投稿のためにもう一度つける」のストーリー予定やで。');
});

document.getElementById('answersBtn').addEventListener('click', () => document.getElementById('sheet').classList.add('show'));
document.getElementById('closeSheet').addEventListener('click', () => document.getElementById('sheet').classList.remove('show'));
renderAnswers();
</script>
</body>
</html>
